<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="calculator-wrap">

            <!-- 계산기 카드 -->
            <div class="calculator">
                <header class="calc-header">
                    <span class="calc-label">Calculator</span>
                    <button class="icon-btn" id="themeBtn" aria-label="테마 전환">🌙</button>
                </header>

                <!-- 디스플레이 -->
                <div class="display">
                    <div class="display-sub" id="subDisplay"></div>
                    <div class="display-main" id="mainDisplay">0</div>
                </div>

                <!-- 버튼 그리드 -->
                <div class="btn-grid">
                    <button class="btn btn-func" data-action="clear">AC</button>
                    <button class="btn btn-func" data-action="percent">%</button>
                    <button class="btn btn-func" data-action="delete">⌫</button>
                    <button class="btn btn-op" data-op="/">÷</button>

                    <button class="btn btn-num" data-num="7">7</button>
                    <button class="btn btn-num" data-num="8">8</button>
                    <button class="btn btn-num" data-num="9">9</button>
                    <button class="btn btn-op" data-op="*">×</button>

                    <button class="btn btn-num" data-num="4">4</button>
                    <button class="btn btn-num" data-num="5">5</button>
                    <button class="btn btn-num" data-num="6">6</button>
                    <button class="btn btn-op" data-op="-">−</button>

                    <button class="btn btn-num" data-num="1">1</button>
                    <button class="btn btn-num" data-num="2">2</button>
                    <button class="btn btn-num" data-num="3">3</button>
                    <button class="btn btn-op" data-op="+">+</button>

                    <button class="btn btn-num span-2" data-num="0">0</button>
                    <button class="btn btn-num" data-num=".">.</button>
                    <button class="btn btn-eq" data-action="equals">=</button>
                </div>

                <button class="history-btn" id="historyBtn">
                    <span>계산 기록</span>
                    <span class="badge" id="badge">0</span>
                </button>
            </div>

            <!-- 기록 패널 -->
            <aside class="history-panel" id="historyPanel">
                <div class="history-top">
                    <h2>계산 기록</h2>
                    <button class="text-btn" id="clearAllBtn">전체 삭제</button>
                </div>
                <ul class="history-list" id="historyList">
                    <li class="empty-msg">아직 계산 기록이 없어요 🧮</li>
                </ul>
            </aside>

        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
